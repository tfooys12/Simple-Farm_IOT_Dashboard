<!DOCTYPE html>
<html>
<head>
  <title>Farm IoT Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🌱 Farm IoT Dashboard</h1>

  <!-- Dashboard Cards -->
  <div class="container">

    <div class="card">
      <h2>🌡️ Temperature</h2>
      <p id="temp">-- °C</p>
    </div>

    <div class="card">
      <h2>💧 Soil Moisture</h2>
      <p id="moisture">-- %</p>
    </div>

  </div>

  <!-- Chart Section -->
  <h2>📊 Temperature Graph</h2>
  <canvas id="tempChart" width="400" height="200"></canvas>

  <!-- Chart.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Your Script -->
  <script src="script.js"></script>

</body>
</html>
